<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="main">
        <div class="container">
            <div class="grid">
                <!-- Card #1 -->
                <div class="box box1">
                    <div class="avatar-row">
                        <div class="avatar">
                            <img src="https://www.barrygoldsteinmd.com/wp-content/themes/barrygoldsteinmd/images/Mood-Disorders.jpg"
                                alt="avatar-image">
                        </div>
                        <div class="who">
                            <span>Hi, I'm Jane.</span>
                            <span>Designer</span>
                        </div>
                    </div>
                    <h1>Designing with purpose, innovating with passion.</h1>
                    <p>I constantly explore new tools and techniques to design impactful and user-friendly digital
                        solutions.</p>
                </div>

                <!-- Card #2 -->
                <div class="box box2"></div>

                <!-- Card #3 -->
                <div class="box box3"></div>

                <!-- Card #4 -->
                <div class="box box4">
                    <div class="social"><i class="ri-facebook-fill"></i></div>
                    <div class="social"><i class="ri-twitter-x-fill"></i></div>
                    <div class="social"><i class="ri-instagram-line"></i></div>
                    <div class="social"><i class="ri-linkedin-fill"></i></div>
                    <div class="social"><i class="ri-dribbble-line"></i></div>
                    <div class="social"><i class="ri-behance-fill"></i></div>
                </div>

                <!-- Card #5 -->
                <div class="box box5">
                    <div class="resource-heading">
                        <div class="eyebrow">Resources</div>
                        <h3>Resources to Speed your workflow</h3>
                    </div>
                    <div class="arrow-btn"><i class="ri-arrow-right-up-line"></i></div>
                </div>


                <div class="box box6"></div>
                <div class="box box7"></div>
                <div class="box box8"></div>
                <div class="box box9"></div>
                <div class="box box10"></div>
                <div class="box box11"></div>
            </div>
        </div>
    </div>
</body>

</html>
